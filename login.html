<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gintama Odd jobs - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
        .login-card {
            max-width: 450px;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
    </style>
  </head>
  <body>

    <div class="login-container">
        <div class="card login-card">
            <div class="card-body">
                <div class="text-center mb-4">
                    <img src="asset/images/2c2d54e0-a68e-4723-8457-cffc4115c3c7.jpeg" alt="Kanigiri Logo" class="mb-2" style="height: 100px;">
                    <h2 class="fw-bold mb-0">Welcome Back!</h2>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <form>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" aria-describedby="emailHelp">
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password">
                    </div>
                    <div class="mb-3 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-warning text-decoration-none small">Forgot Password?</a>
                    </div>
                    <a href="index.html" type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-3">LOGIN</a>
                    <p class="text-center text-muted small">or sign in with</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-secondary">
                            <i class="fab fa-google me-2"></i> Continue with Google
                        </button>
                        <button class="btn btn-outline-secondary">
                            <i class="fab fa-facebook-f me-2"></i> Continue with Facebook
                        </button>
                    </div>
                </form>

                <p class="text-center mt-4">
                    Don't have an account? <a href="#" class="text-warning text-decoration-none fw-bold">Sign up here</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
